[book]
title = "AtomixOS"
description = "NixOS-based firmware with atomic A/B OTA updates for Rock64 edge gateways"
authors = ["Robert DeRose"]
language = "en"
src = "src"

[build]
build-dir = "../book"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/RobertDeRose/AtomicNIx"
edit-url-template = "https://github.com/RobertDeRose/AtomicNIx/edit/main/docs/{path}"
additional-css = ["theme/cobalt.css"]
additional-js = ["mermaid.min.js", "mermaid-init.js"]
